<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris T. | Links</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #f0f6fc;
            --accent-color: #58a6ff;
            --hover-bg: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }

        p {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 5px;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/150" alt="Chris T." class="profile-pic">
        <h1>Chris T.</h1>
        <p>Data Analyst & Tech Enthusiast</p>
    </div>

    <div class="links-container">
        <a href="https://instagram.com/cturkoanje" class="link-card" target="_blank">Instagram</a>
        <a href="https://facebook.com/cturkoanje" class="link-card" target="_blank">Facebook</a>
        <a href="https://x.com/cturkoanje" class="link-card" target="_blank">X (Twitter)</a>
        <a href="https://linkedin.com/in/cturkoanje" class="link-card" target="_blank">LinkedIn</a>
    </div>

    <footer>
        &copy; 2026 Chris T.
    </footer>

</body>
</html>
